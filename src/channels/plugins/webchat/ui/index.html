<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="screen">
      <div class="login-form">
        <h1>Chat</h1>
        <p class="subtitle">Connect to assistant</p>
        <button id="start-btn" class="btn primary">Start Chat</button>
      </div>
    </div>
    
    <!-- Chat Screen -->
    <div id="chat-screen" class="screen hidden">
      <header class="chat-header">
        <div class="assistant-info">
          <div class="avatar">🤖</div>
          <div class="name">Assistant</div>
        </div>
        <button id="menu-btn" class="icon-btn">⋮</button>
      </header>
      
      <div id="messages" class="messages-container">
        <div class="message assistant">
          <div class="avatar">🤖</div>
          <div class="bubble">Hello! How can I help you today?</div>
        </div>
      </div>
      
      <div class="typing-indicator hidden" id="typing">
        <span></span><span></span><span></span>
      </div>
      
      <footer class="input-area">
        <textarea 
          id="message-input" 
          placeholder="Type a message..." 
          rows="1"
          maxlength="2000"
        ></textarea>
        <button id="send-btn" class="btn send-btn" disabled>
          <svg viewBox="0 0 24 24" width="24" height="24">
            <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </footer>
    </div>
    
    <!-- Connection Status -->
    <div id="status-bar" class="status-bar hidden">
      <span class="status-dot"></span>
      <span class="status-text">Connecting...</span>
    </div>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
